name: Daily JCZQ Build & Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # 北京时间09:30、21:30自动更新，无需修改
    - cron: "30 1,13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 赛事核心API，自动读取你配置的Secrets
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      # 豆包API专属配置，自动兜底官方地址
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      # 全局兜底开关，无数据时自动降级，避免流程中断
      ALLOW_GLOBAL_FIXTURE_FALLBACK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # 缓存依赖，大幅缩短运行时间

      - name: 安装核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 密钥校验（仅保留必填项，移除Gemini相关校验）
        run: |
          set -e
          required_vars=(API_FOOTBALL_KEY FOOTBALL_DATA_KEY ODDS_API_KEY OPENAI_API_KEY)
          for v in "${required_vars[@]}"; do
            val="${!v}"
            if [[ -z "$val" ]]; then
              echo "ERROR: 缺失必填密钥 $v，请先在Secrets中配置"
              exit 1
            fi
            if [[ "$val" =~ your_|_here|placeholder|changeme ]]; then
              echo "ERROR: 密钥 $v 是占位符，请替换为真实密钥"
              exit 1
            fi
          done
          # 豆包API自动兜底，未配置自动用官方地址
          if [[ -z "$OPENAI_BASE_URL" ]]; then
            echo "OPENAI_BASE_URL=https://ark.cn-beijing.volces.com/api/v3" >> "$GITHUB_ENV"
          fi
          if [[ -z "$OPENAI_MODEL" ]]; then
            echo "OPENAI_MODEL=doubao-1.5-pro-32k" >> "$GITHUB_ENV"
          fi

      - name: 运行预测管道（仅用国外API+豆包，无国内爬虫）
        run: |
          python -m src.daily_jczq_pipeline

      - name: 上传部署产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
