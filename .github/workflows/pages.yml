name: Daily JCZQ Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Beijing 09:30 and 21:30 => UTC 01:30 and 13:30
    - cron: "30 1,13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ALLOW_GLOBAL_FIXTURE_FALLBACK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn requests beautifulsoup4 lxml python-dotenv

      - name: Validate Required Secrets
        run: |
          set -e
          # 仅修改此处：移除GEMINI_API_KEY必填校验，其余原校验规则完全保留
          required_vars=(API_FOOTBALL_KEY FOOTBALL_DATA_KEY ODDS_API_KEY OPENAI_API_KEY)
          for v in "${required_vars[@]}"; do
            val="${!v}"
            if [[ -z "$val" ]]; then
              echo "ERROR: missing required secret $v"
              exit 1
            fi
            if [[ "$val" =~ your_|_here|placeholder|changeme ]]; then
              echo "ERROR: secret $v looks like a placeholder"
              exit 1
            fi
          done

          if [[ -z "$OPENAI_BASE_URL" ]]; then
            echo "OPENAI_BASE_URL not set, using default relay"
            # 保留修复：替换失效地址，解决解析报错
            echo "OPENAI_BASE_URL=https://ark.cn-beijing.volces.com/api/v3" >> "$GITHUB_ENV"
          fi
          if [[ -z "$GEMINI_BASE_URL" ]]; then
            echo "GEMINI_BASE_URL not set, using default relay"
            # 保留修复：替换失效地址，解决解析报错
            echo "GEMINI_BASE_URL=https://generativelanguage.googleapis.com/v1beta" >> "$GITHUB_ENV"
          fi
          if [[ -z "$OPENAI_MODEL" ]]; then
            echo "OPENAI_MODEL=gpt-5.4,gpt-5.3" >> "$GITHUB_ENV"
          fi
          if [[ -z "$GEMINI_MODEL" ]]; then
            echo "GEMINI_MODEL=gemini-3.1-pro,gemini-3.0-pro" >> "$GITHUB_ENV"
          fi

      - name: Run Daily JCZQ Pipeline
        run: |
          python -m src.daily_jczq_pipeline --run-scrapers

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
