name: Daily JCZQ Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # Beijing 09:30 and 21:30 => UTC 01:30 and 13:30 原定时规则完全不动
    - cron: "30 1,13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 赛事数据核心必填配置 原代码完全不动
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      # 豆包API专属配置 兼容原代码OpenAI接口逻辑 无需改项目代码
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      # 原有全局配置 原代码完全不动
      ALLOW_GLOBAL_FIXTURE_FALLBACK: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scipy scikit-learn requests beautifulsoup4 lxml python-dotenv

      - name: Validate Required Secrets（适配豆包，无有效密钥直接报错）
        run: |
          set -e
          # 移除Gemini强制校验，仅保留赛事必填项+豆包API密钥强制校验
          required_vars=(API_FOOTBALL_KEY FOOTBALL_DATA_KEY ODDS_API_KEY OPENAI_API_KEY)
          for v in "${required_vars[@]}"; do
            val="${!v}"
            if [[ -z "$val" ]]; then
              echo "ERROR: missing required secret $v"
              exit 1
            fi
            if [[ "$val" =~ your_|_here|placeholder|changeme ]]; then
              echo "ERROR: secret $v looks like a placeholder"
              exit 1
            fi
          done

          # 未配置地址时，默认使用豆包官方接口地址，彻底替换失效中转地址
          if [[ -z "$OPENAI_BASE_URL" ]]; then
            echo "OPENAI_BASE_URL not set, using Doubao official address"
            echo "OPENAI_BASE_URL=https://ark.cn-beijing.volces.com/api/v3" >> "$GITHUB_ENV"
          fi
          # 未配置模型时，默认使用豆包1.5-pro-32k，替换原GPT模型
          if [[ -z "$OPENAI_MODEL" ]]; then
            echo "OPENAI_MODEL=doubao-1.5-pro-32k" >> "$GITHUB_ENV"
          fi

      - name: Run Daily JCZQ Pipeline
        run: |
          # 先单独运行爬虫，输出完整报错日志，排查问题
          python run_collectors.py
          # 再运行主管道，启用爬虫刷新
          python -m src.daily_jczq_pipeline --run-scrapers

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
