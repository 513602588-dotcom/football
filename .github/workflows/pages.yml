name: Daily Football Prediction Deploy
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # 北京时间09:30、21:30自动执行
    - cron: "30 1 * * *"
    - cron: "30 13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 设置Pages
        uses: actions/configure-pages@v5

      - name: 密钥校验
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [[ -z "$API_FOOTBALL_KEY" || -z "$ODDS_API_KEY" || -z "$OPENAI_API_KEY" ]]; then
            echo "ERROR: 核心密钥缺失，请检查GitHub Secrets配置"
            exit 1
          fi
          echo "所有核心密钥配置正常"

      - name: 执行预测流水线
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          ALLOW_GLOBAL_FIXTURE_FALLBACK: "true"
        run: |
          python -m src.daily_jczq_pipeline

      - name: 上传构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: 部署到GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
