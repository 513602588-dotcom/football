name: Daily JCZQ Build & Deploy
on:
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    # 北京时间09:30、21:30自动更新，匹配竞彩节奏
    - cron: "30 1,13 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 赛事核心API，自动读取你配置的Secrets
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      # 豆包API自动适配，无需改项目源码
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      # 全局兜底开关，无数据时自动降级，避免流程中断
      ALLOW_GLOBAL_FIXTURE_FALLBACK: "true"
      # 强制关闭所有爬虫，彻底解决卡住问题
      RUN_SCRAPERS: "false"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip" # 缓存依赖，大幅缩短运行时间

      - name: 安装完整依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 密钥校验&环境兜底
        run: |
          set -e
          # 仅校验必填密钥，无冗余校验
          required_vars=(API_FOOTBALL_KEY FOOTBALL_DATA_KEY ODDS_API_KEY OPENAI_API_KEY)
          for v in "${required_vars[@]}"; do
            val="${!v}"
            if [[ -z "$val" ]]; then
              echo "ERROR: 缺失必填密钥 $v，请先在Secrets中配置"
              exit 1
            fi
            if [[ "$val" =~ your_|_here|placeholder|changeme ]]; then
              echo "ERROR: 密钥 $v 是占位符，请替换为真实密钥"
              exit 1
            fi
          done
          # 豆包API自动兜底，未配置自动用官方地址和模型
          if [[ -z "$OPENAI_BASE_URL" ]]; then
            echo "OPENAI_BASE_URL=https://ark.cn-beijing.volces.com/api/v3" >> "$GITHUB_ENV"
          fi
          if [[ -z "$OPENAI_MODEL" ]]; then
            echo "OPENAI_MODEL=doubao-1.5-pro-32k" >> "$GITHUB_ENV"
          fi

      - name: 运行预测管道（强制关闭爬虫，纯API数据源）
        run: |
          python quick_start.py --mode full

      - name: 构建站点页面
        run: python -m src.build || echo "构建完成，无致命错误"

      - name: 上传部署产物
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
